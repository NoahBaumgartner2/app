<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folien → Zusammenfassung → PDF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f6f5f0;
    --bg-tertiary: #efede6;
    --bg-info: #e6f1fb;
    --bg-success: #eaf3de;
    --bg-warning: #faeeda;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --text-info: #185fa5;
    --text-success: #3b6d11;
    --text-warning: #854f0b;
    --border-light: rgba(26,26,24,0.12);
    --border-medium: rgba(26,26,24,0.25);
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c;
      --bg-secondary: #2a2a27;
      --bg-tertiary: #242422;
      --bg-info: #0c2a4a;
      --bg-success: #122b06;
      --bg-warning: #3a200a;
      --text-primary: #f0ede4;
      --text-secondary: #a8a69e;
      --text-tertiary: #6e6c66;
      --text-info: #85b7eb;
      --text-success: #97c459;
      --text-warning: #ef9f27;
      --border-light: rgba(240,237,228,0.12);
      --border-medium: rgba(240,237,228,0.25);
    }
  }

  body {
    font-family: 'EB Garamond', Georgia, serif;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── HEADER ─── */
  .app-header {
    padding: 1.5rem 2rem;
    border-bottom: 0.5px solid var(--border-light);
    background: var(--bg-primary);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .app-title {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.3px;
  }

  .app-subtitle {
    font-size: 15px;
    color: var(--text-secondary);
    font-style: italic;
  }

  .api-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-light);
  }

  .api-bar label {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }

  .api-bar input {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    min-width: 0;
  }

  .api-status {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .api-status.empty { background: var(--bg-warning); color: var(--text-warning); }
  .api-status.set   { background: var(--bg-success); color: var(--text-success); }

  /* ─── MAIN GRID ─── */
  .main-content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
  }

  .panel {
    padding: 1.5rem 2rem;
    background: var(--bg-primary);
    border-right: 0.5px solid var(--border-light);
  }
  .panel:last-child { border-right: none; }

  .panel-title {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-secondary);
    margin-bottom: 1rem;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ─── UPLOAD ─── */
  .upload-zone {
    border: 1.5px dashed var(--border-medium);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg-secondary);
    position: relative;
    margin-bottom: 1rem;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--text-info);
    background: var(--bg-info);
  }
  .upload-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .upload-icon { font-size: 36px; color: var(--text-tertiary); margin-bottom: 10px; display: block; }
  .upload-text { font-size: 16px; color: var(--text-secondary); margin-bottom: 4px; }
  .upload-hint { font-size: 12px; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }

  .file-info {
    font-size: 12px;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 12px;
    display: none;
  }

  /* ─── FORM FIELDS ─── */
  .field { margin-bottom: 1rem; }

  .field-label {
    display: block;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-tertiary);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  select, input[type="text"].field-input {
    width: 100%;
    padding: 8px 10px;
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-md);
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }
  select:focus, input[type="text"].field-input:focus {
    border-color: var(--border-medium);
  }

  /* ─── BUTTONS ─── */
  .convert-btn {
    width: 100%;
    padding: 11px;
    font-family: 'EB Garamond', serif;
    font-size: 17px;
    background: var(--text-primary);
    color: var(--bg-primary);
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 0.5rem;
  }
  .convert-btn:hover { opacity: 0.82; }
  .convert-btn:disabled { opacity: 0.38; cursor: not-allowed; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 0.7s linear infinite; display: inline-block; }

  .editor-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .action-btn {
    flex: 1;
    padding: 9px 12px;
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    background: var(--bg-primary);
    color: var(--text-primary);
    border: 0.5px solid var(--border-medium);
    border-radius: var(--radius-md);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .action-btn:hover { background: var(--bg-secondary); }
  .action-btn:disabled { opacity: 0.38; cursor: not-allowed; }
  .action-btn.primary {
    background: var(--text-primary);
    color: var(--bg-primary);
    border-color: transparent;
  }
  .action-btn.primary:hover { opacity: 0.82; }

  /* ─── LATEX EDITOR ─── */
  .latex-editor {
    width: 100%;
    min-height: 380px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    background: var(--bg-secondary);
    color: var(--text-primary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 1rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  .latex-editor:focus { border-color: var(--border-medium); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 380px;
    color: var(--text-tertiary);
    gap: 10px;
    font-style: italic;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-light);
  }
  .empty-state i { font-size: 32px; }

  /* ─── STATUS BAR ─── */
  .status-bar {
    padding: 9px 2rem;
    background: var(--bg-primary);
    border-top: 0.5px solid var(--border-light);
    font-size: 12px;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border-medium);
    flex-shrink: 0;
  }
  .status-dot.active  { background: #3b6d11; }
  .status-dot.error   { background: #a32d2d; }
  .status-dot.loading { background: #185fa5; animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ─── PDF PROGRESS ─── */
  .pdf-progress {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--bg-info);
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-light);
    font-size: 13px;
    color: var(--text-info);
    font-family: 'JetBrains Mono', monospace;
    display: none;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 720px) {
    .main-content { grid-template-columns: 1fr; }
    .panel { border-right: none; border-bottom: 0.5px solid var(--border-light); }
    .header-top { flex-direction: column; gap: 4px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-top">
    <a href="/" style="font-size:12px;color:var(--text-secondary);text-decoration:none;font-family:'JetBrains Mono',monospace;margin-right:12px">← Dashboard</a>
    <h1 class="app-title"><i class="ti ti-file-text" style="font-size:20px;vertical-align:-2px;margin-right:8px"></i>Folien → Zusammenfassung → PDF</h1>
    <span class="app-subtitle">BWL &amp; Wirtschaft</span>
  </div>
  <div class="api-bar">
    <label>GEMINI API KEY</label>
    <input type="password" id="apiKey" placeholder="AIza..." oninput="updateApiStatus()" autocomplete="off" />
    <span class="api-status empty" id="apiStatus">nicht gesetzt</span>
  </div>
</header>

<!-- MAIN -->
<main class="main-content">

  <!-- LEFT: Upload & Settings -->
  <section class="panel">
    <div class="panel-title"><i class="ti ti-upload"></i>&nbsp; PDF hochladen</div>

    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".pdf,application/pdf" onchange="handleFile(event)" />
      <i class="ti ti-file-type-pdf upload-icon"></i>
      <div class="upload-text">Vorlesungsfolien ablegen oder klicken</div>
      <div class="upload-hint">PDF &nbsp;·&nbsp; max 50 MB</div>
    </div>

    <div class="file-info" id="fileInfo"></div>

    <div class="field">
      <label class="field-label">Fach</label>
      <select id="subject">
        <option value="Wirtschaftsinformatik">Wirtschaftsinformatik</option>
        <option value="Marketing">Marketing</option>
        <option value="Controlling">Controlling</option>
        <option value="Rechnungswesen">Rechnungswesen / Buchhaltung</option>
        <option value="Management">Management &amp; Organisation</option>
        <option value="Finanzierung">Finanzierung &amp; Investition</option>
        <option value="Mikroökonomie">Mikroökonomie</option>
        <option value="Makroökonomie">Makroökonomie</option>
        <option value="Statistik">Statistik &amp; Methoden</option>
        <option value="Recht">Wirtschaftsrecht</option>
        <option value="Logistik">Logistik &amp; Supply Chain</option>
        <option value="Entrepreneurship">Entrepreneurship</option>
        <option value="Sonstiges">Sonstiges BWL-Fach</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label">Titel <span style="text-transform:none;font-weight:400">(optional)</span></label>
      <input type="text" class="field-input" id="docTitle" placeholder="z.B. Vorlesung 3 – CRM-Systeme" />
    </div>

    <button class="convert-btn" id="convertBtn" onclick="summarize()" disabled>
      <i class="ti ti-sparkles" id="convertIcon"></i>
      <span id="convertLabel">Zusammenfassung erstellen</span>
    </button>
  </section>

  <!-- RIGHT: Output -->
  <section class="panel">
    <div class="panel-title"><i class="ti ti-code"></i>&nbsp; LaTeX-Zusammenfassung</div>

    <div id="emptyState" class="empty-state">
      <i class="ti ti-file-description"></i>
      <span>Noch keine Zusammenfassung generiert</span>
    </div>

    <textarea class="latex-editor" id="latexEditor" style="display:none" spellcheck="false"
      placeholder="LaTeX-Code erscheint hier..."></textarea>

    <div class="pdf-progress" id="pdfProgress">
      <i class="ti ti-loader spin"></i>&nbsp; Kompiliere LaTeX zu PDF über Server...
    </div>

    <div class="field" style="margin-top:10px">
      <label class="field-label">Dateiname</label>
      <input type="text" class="field-input" id="fileNameInput" placeholder="z.B. Vorlesung_Analysis_01" />
    </div>

    <div class="editor-actions">
      <button class="action-btn" onclick="copyLatex()" id="copyBtn" disabled>
        <i class="ti ti-copy"></i> Kopieren
      </button>
      <button class="action-btn" onclick="downloadTex()" id="texBtn" disabled>
        <i class="ti ti-file-code"></i> .tex
      </button>
      <button class="action-btn primary" onclick="downloadPdf()" id="pdfBtn" disabled>
        <i class="ti ti-file-type-pdf"></i> PDF herunterladen
      </button>
    </div>
  </section>

</main>

<!-- STATUS BAR -->
<footer class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusMsg">Bereit &nbsp;·&nbsp; API-Key eingeben und PDF hochladen</span>
</footer>

<script>
  let selectedFile = null;
  let currentFileName = 'zusammenfassung';

  /* ── API KEY ── */
  function updateApiStatus() {
    const key = document.getElementById('apiKey').value.trim();
    const el  = document.getElementById('apiStatus');
    if (key.length > 10) {
      el.textContent = 'gesetzt';
      el.className   = 'api-status set';
    } else {
      el.textContent = 'nicht gesetzt';
      el.className   = 'api-status empty';
    }
    checkReady();
  }

  function checkReady() {
    const key = document.getElementById('apiKey').value.trim();
    document.getElementById('convertBtn').disabled = !(key.length > 10 && selectedFile);
  }

  /* ── FILE UPLOAD ── */
  function handleFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 50 * 1024 * 1024) {
      setStatus('Datei zu gross · Maximum 50 MB', 'error');
      return;
    }

    selectedFile = file;
    currentFileName = file.name.replace(/\.pdf$/i, '');

    const info       = document.getElementById('fileInfo');
    info.textContent = file.name + ' · ' + (file.size / 1024 / 1024).toFixed(1) + ' MB';
    info.style.display = 'block';

    document.getElementById('uploadZone').style.borderStyle = 'solid';

    if (!document.getElementById('docTitle').value) {
      document.getElementById('docTitle').value = currentFileName.replace(/[-_]/g, ' ');
    }

    setStatus('PDF geladen: ' + file.name, '');
    checkReady();
  }

  /* Drag & Drop */
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile({ target: { files: [file] } });
  });

  /* ── STATUS ── */
  function setStatus(msg, mode) {
    document.getElementById('statusMsg').textContent = msg;
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot' + (mode ? ' ' + mode : '');
  }

  /* ── SUMMARIZE ── */
  async function summarize() {
    const key     = document.getElementById('apiKey').value.trim();
    const subject = document.getElementById('subject').value;
    const title   = document.getElementById('docTitle').value.trim() || currentFileName;
    if (!key || !selectedFile) return;

    const btn   = document.getElementById('convertBtn');
    const icon  = document.getElementById('convertIcon');
    const label = document.getElementById('convertLabel');

    btn.disabled      = true;
    icon.className    = 'ti ti-loader spin';
    label.textContent = 'Gemini erstellt Zusammenfassung...';
    setStatus('Sende PDF an Gemini API...', 'loading');

    const formData = new FormData();
    formData.append('pdf',     selectedFile);
    formData.append('apiKey',  key);
    formData.append('subject', subject);
    formData.append('title',   title);

    try {
      const response = await fetch('/apps/latex-study/api/summarize', {
        method: 'POST',
        body: formData
      });

      const data = await response.json();
      if (!response.ok || !data.success) throw new Error(data.error || 'Unbekannter Fehler');

      currentFileName = data.fileName || title;
      showEditor(data.latex);

      const charCount = data.charCount || data.latex.length;
      setStatus(
        'Zusammenfassung erstellt · ' + data.latex.split('\n').length + ' Zeilen · ' +
        (charCount > 1000 ? (charCount / 1000).toFixed(1) + 'k' : charCount) + ' Zeichen',
        'active'
      );

    } catch (err) {
      setStatus('Fehler: ' + err.message, 'error');
      console.error(err);
    } finally {
      btn.disabled      = false;
      icon.className    = 'ti ti-sparkles';
      label.textContent = 'Zusammenfassung erstellen';
      checkReady();
    }
  }

  function showEditor(latex) {
    document.getElementById('emptyState').style.display = 'none';
    const editor = document.getElementById('latexEditor');
    editor.style.display = 'block';
    editor.value = latex;
    document.getElementById('copyBtn').disabled = false;
    document.getElementById('texBtn').disabled  = false;
    document.getElementById('pdfBtn').disabled  = false;
  }

  /* ── FILENAME HELPER ── */
  function getFileName() {
    const raw = document.getElementById('fileNameInput').value.trim();
    return (raw || currentFileName).replace(/[/\\:*?"<>|]/g, '_').replace(/\.(pdf|tex)$/i, '');
  }

  /* ── COPY ── */
  function copyLatex() {
    const code = document.getElementById('latexEditor').value;
    navigator.clipboard.writeText(code).then(() => {
      setStatus('LaTeX-Code in Zwischenablage kopiert', 'active');
    });
  }

  /* ── DOWNLOAD .tex ── */
  function downloadTex() {
    const latex = document.getElementById('latexEditor').value;
    if (!latex) return;
    const name = getFileName();
    const blob = new Blob([latex], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = name + '.tex';
    a.click();
    URL.revokeObjectURL(url);
    setStatus('.tex-Datei heruntergeladen', 'active');
  }

  /* ── PDF via lokaler Server ── */
  async function downloadPdf() {
    const latex = document.getElementById('latexEditor').value;
    if (!latex) return;
    const name = getFileName();

    const btn      = document.getElementById('pdfBtn');
    const progress = document.getElementById('pdfProgress');

    btn.disabled           = true;
    progress.style.display = 'block';
    setStatus('Kompiliere LaTeX zu PDF...', 'loading');

    try {
      const response = await fetch('/apps/latex-study/api/compile-pdf', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ latex, fileName: name })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error || 'Kompilierungsfehler');
      }

      const blob = await response.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = name + '.pdf';
      a.click();
      URL.revokeObjectURL(url);
      setStatus('PDF erfolgreich heruntergeladen', 'active');

    } catch (err) {
      setStatus('PDF-Fehler: ' + err.message + ' · Lade stattdessen .tex herunter', 'error');
      downloadTex();
    } finally {
      btn.disabled           = false;
      progress.style.display = 'none';
    }
  }
</script>
<script>
// ── Secret auto-load / auto-save ───────────────────────────────────────────
(async () => {
  const s = await fetch('/api/secrets').then(r => r.ok ? r.json() : {}).catch(() => ({}));
  if (s.gemini_api_key) {
    document.getElementById('apiKey').value = s.gemini_api_key;
    updateApiStatus();
  }
})();

let _secretTimer;
document.getElementById('apiKey').addEventListener('input', function() {
  clearTimeout(_secretTimer);
  _secretTimer = setTimeout(() => {
    fetch('/api/secrets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: 'gemini_api_key', value: this.value.trim() })
    });
  }, 700);
});
</script>
</body>
</html>
