<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprachassistent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff; --bg-secondary: #f6f5f0; --bg-tertiary: #efede6;
    --bg-info: #e6f1fb; --bg-success: #eaf3de; --bg-warning: #faeeda;
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-tertiary: #888780;
    --text-info: #185fa5; --text-success: #3b6d11; --text-warning: #854f0b;
    --border-light: rgba(26,26,24,0.12); --border-medium: rgba(26,26,24,0.25);
    --radius-md: 8px; --radius-lg: 12px;
    --c-wake: #185fa5; --c-command: #854f0b; --c-speak: #3b6d11; --c-error: #a32d2d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c; --bg-secondary: #2a2a27; --bg-tertiary: #242422;
      --bg-info: #0c2a4a; --bg-success: #122b06; --bg-warning: #3a200a;
      --text-primary: #f0ede4; --text-secondary: #a8a69e; --text-tertiary: #6e6c66;
      --text-info: #85b7eb; --text-success: #97c459; --text-warning: #ef9f27;
      --border-light: rgba(240,237,228,0.12); --border-medium: rgba(240,237,228,0.25);
      --c-wake: #85b7eb; --c-command: #ef9f27; --c-speak: #97c459; --c-error: #e87070;
    }
  }

  body { font-family: 'EB Garamond', Georgia, serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }

  /* ─── HEADER ─── */
  .app-header { padding: 1rem 1.5rem; border-bottom: 0.5px solid var(--border-light); background: var(--bg-primary); display: flex; align-items: center; gap: 1rem; }
  .app-title { font-size: 20px; font-weight: 500; flex: 1; }
  .icon-btn { background: none; border: 0.5px solid var(--border-light); border-radius: var(--radius-md); padding: 6px 10px; cursor: pointer; color: var(--text-secondary); font-size: 18px; transition: background 0.15s; display: flex; align-items: center; }
  .icon-btn:hover { background: var(--bg-secondary); }
  .icon-btn.active { background: var(--bg-info); color: var(--text-info); border-color: var(--text-info); }

  /* ─── SETTINGS ─── */
  .settings-panel { background: var(--bg-primary); border-bottom: 0.5px solid var(--border-light); padding: 1.25rem 1.5rem; display: none; }
  .settings-panel.open { display: block; }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-bottom: 12px; }
  @media (max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }
  .field-label { display: block; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-tertiary); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; }
  .field-input { width: 100%; padding: 7px 10px; font-family: 'EB Garamond', serif; font-size: 15px; background: var(--bg-secondary); color: var(--text-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-md); outline: none; transition: border-color 0.15s; }
  .field-input:focus { border-color: var(--border-medium); }
  .save-btn { padding: 8px 20px; font-family: 'EB Garamond', serif; font-size: 16px; background: var(--text-primary); color: var(--bg-primary); border: none; border-radius: var(--radius-md); cursor: pointer; transition: opacity 0.15s; }
  .save-btn:hover { opacity: 0.82; }

  /* ─── MAIN ─── */
  main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 2rem 1.5rem 1.5rem; gap: 1.5rem; overflow-y: auto; }

  /* ─── MIC BUTTON ─── */
  .mic-wrap { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }

  .pulse-ring {
    position: absolute;
    width: 114px; height: 114px;
    top: 50%; left: 50%;
    border-radius: 50%;
    border: 2px solid transparent;
    opacity: 0;
    pointer-events: none;
  }

  .mic-btn {
    position: relative; z-index: 2;
    width: 114px; height: 114px; border-radius: 50%;
    border: 2px solid var(--border-medium);
    background: var(--bg-primary);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 44px; color: var(--text-tertiary);
    transition: color 0.3s, border-color 0.3s, box-shadow 0.3s;
    outline: none; box-shadow: 0 4px 20px rgba(0,0,0,0.09);
  }
  .mic-btn:hover { transform: scale(1.03); }

  /* State colours */
  .wrap-wake    .mic-btn { color: var(--c-wake);    border-color: var(--c-wake); }
  .wrap-command .mic-btn { color: var(--c-command); border-color: var(--c-command); }
  .wrap-process .mic-btn { color: var(--text-tertiary); border-color: var(--border-medium); }
  .wrap-speak   .mic-btn { color: var(--c-speak);   border-color: var(--c-speak); }
  .wrap-error   .mic-btn { color: var(--c-error);   border-color: var(--c-error); }

  /* Pulse animations */
  @keyframes ring-wake    { 0%{transform:translate(-50%,-50%) scale(1); opacity:.65} 100%{transform:translate(-50%,-50%) scale(1.65); opacity:0} }
  @keyframes ring-command { 0%{transform:translate(-50%,-50%) scale(1); opacity:.8}  100%{transform:translate(-50%,-50%) scale(1.7);  opacity:0} }
  @keyframes ring-speak   { 0%{transform:translate(-50%,-50%) scale(1); opacity:.75} 100%{transform:translate(-50%,-50%) scale(1.8);  opacity:0} }
  @keyframes spin { to { transform: rotate(360deg); } }

  .wrap-wake    .pulse-ring { border-color: var(--c-wake);    animation: ring-wake    2s  ease-out infinite; }
  .wrap-command .pulse-ring { border-color: var(--c-command); animation: ring-command 1.1s ease-out infinite; }
  .wrap-speak   .pulse-ring { border-color: var(--c-speak);   animation: ring-speak   0.95s ease-out infinite; }

  .pulse-ring:nth-child(2) { animation-delay: 0.35s !important; }
  .pulse-ring:nth-child(3) { animation-delay: 0.70s !important; }

  .spin-icon { display: inline-block; animation: spin 0.85s linear infinite; }

  /* ─── STATUS TEXT ─── */
  .status-text { font-size: 18px; color: var(--text-secondary); text-align: center; font-style: italic; max-width: 420px; line-height: 1.4; }

  /* ─── RESPONSE BOX ─── */
  .response-box { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 1rem 1.25rem; max-width: 600px; width: 100%; }
  .response-label { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .response-text { font-size: 21px; line-height: 1.5; font-style: italic; }

  /* ─── TRANSCRIPT ─── */
  .transcript-section { width: 100%; max-width: 600px; }
  .transcript-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .transcript-title { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
  .clear-btn { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text-tertiary); background: none; border: 0.5px solid var(--border-light); border-radius: var(--radius-md); padding: 3px 10px; cursor: pointer; transition: background 0.15s; }
  .clear-btn:hover { background: var(--bg-secondary); }
  .transcript-list { max-height: 270px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .t-item { padding: 8px 12px; border-radius: var(--radius-md); font-size: 15px; line-height: 1.4; }
  .t-item.user      { background: var(--bg-secondary); margin-left: 2.5rem; }
  .t-item.assistant { background: var(--bg-info);      margin-right: 2.5rem; }
  .t-meta { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-tertiary); margin-bottom: 3px; }

  /* ─── STATUS BAR ─── */
  .status-bar { padding: 9px 1.5rem; background: var(--bg-primary); border-top: 0.5px solid var(--border-light); font-size: 12px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-medium); flex-shrink: 0; }
  .status-dot.active  { background: #3b6d11; }
  .status-dot.error   { background: #a32d2d; }
  .status-dot.loading { background: #185fa5; animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <a href="/" style="font-size:12px;color:var(--text-secondary);text-decoration:none;font-family:'JetBrains Mono',monospace;white-space:nowrap">← Dashboard</a>
  <h1 class="app-title"><i class="ti ti-microphone" style="font-size:18px;vertical-align:-2px;margin-right:8px"></i>Sprachassistent</h1>
  <button class="icon-btn" id="settingsToggle" onclick="toggleSettings()" title="Einstellungen">
    <i class="ti ti-settings"></i>
  </button>
</header>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-grid">
    <div>
      <label class="field-label">Assistent Name</label>
      <input type="text" class="field-input" id="cfgName" placeholder="z.B. Jarvis" />
    </div>
    <div>
      <label class="field-label">Dein Name</label>
      <input type="text" class="field-input" id="cfgUser" placeholder="z.B. Noah" />
    </div>
    <div>
      <label class="field-label">Gemini API Key</label>
      <input type="password" class="field-input" id="cfgApiKey" placeholder="AIza..." autocomplete="off" />
    </div>
    <div>
      <label class="field-label">Home Assistant URL</label>
      <input type="text" class="field-input" id="cfgHaUrl" placeholder="http://homeassistant.local:8123" />
    </div>
    <div style="grid-column:1/-1">
      <label class="field-label">Home Assistant Token</label>
      <input type="password" class="field-input" id="cfgHaToken" placeholder="Long-Lived Access Token…" autocomplete="off" />
    </div>
  </div>
  <button class="save-btn" onclick="saveSettings()"><i class="ti ti-device-floppy" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>Einstellungen speichern</button>
</div>

<!-- MAIN -->
<main>

  <!-- Mic -->
  <div class="mic-wrap" id="micWrap">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <button class="mic-btn" id="micBtn" onclick="toggleListening()">
      <i class="ti ti-microphone" id="micIcon"></i>
    </button>
  </div>

  <p class="status-text" id="statusText">Einstellungen öffnen und Mikrofon starten</p>

  <!-- Last response -->
  <div class="response-box" id="responseBox" style="display:none">
    <div class="response-label"><i class="ti ti-robot" style="vertical-align:-1px"></i>&nbsp; Antwort</div>
    <div class="response-text" id="responseText"></div>
  </div>

  <!-- Transcript -->
  <div class="transcript-section">
    <div class="transcript-header">
      <span class="transcript-title"><i class="ti ti-messages" style="vertical-align:-1px"></i>&nbsp; Verlauf</span>
      <button class="clear-btn" onclick="clearHistory()">Löschen</button>
    </div>
    <div class="transcript-list" id="transcriptList"></div>
  </div>

</main>

<!-- STATUS BAR -->
<footer class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusMsg">Bereit</span>
</footer>

<script>
'use strict';

// ── Settings ─────────────────────────────────────────────────────────────────
let cfg = { assistantName: 'Jarvis', userName: '', apiKey: '', haUrl: '', haToken: '' };

function loadSettings() {
  try { cfg = { ...cfg, ...JSON.parse(localStorage.getItem('voice-assistant-settings') || '{}') }; } catch {}
  document.getElementById('cfgName').value    = cfg.assistantName;
  document.getElementById('cfgUser').value    = cfg.userName;
  document.getElementById('cfgApiKey').value  = cfg.apiKey;
  document.getElementById('cfgHaUrl').value   = cfg.haUrl;
  document.getElementById('cfgHaToken').value = cfg.haToken;
  refreshStatusText();
}

function saveSettings() {
  cfg.assistantName = document.getElementById('cfgName').value.trim()    || 'Jarvis';
  cfg.userName      = document.getElementById('cfgUser').value.trim();
  cfg.apiKey        = document.getElementById('cfgApiKey').value.trim();
  cfg.haUrl         = document.getElementById('cfgHaUrl').value.trim();
  cfg.haToken       = document.getElementById('cfgHaToken').value.trim();
  localStorage.setItem('voice-assistant-settings', JSON.stringify(cfg));
  if (cfg.apiKey) {
    fetch('/api/secrets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: 'gemini_api_key', value: cfg.apiKey })
    }).catch(() => {});
  }
  setFooter('Einstellungen gespeichert', 'active');
  refreshStatusText();
}

function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  const b = document.getElementById('settingsToggle');
  p.classList.toggle('open');
  b.classList.toggle('active');
}

// ── State ─────────────────────────────────────────────────────────────────────
// idle | wake | command | process | speak | error
let state   = 'idle';
let active  = false; // wake-word mode on/off
let history = [];    // conversation history

let wakeRec = null, cmdRec = null, cmdTimer = null;

function setState(s) {
  state = s;
  const wrap = document.getElementById('micWrap');
  const icon = document.getElementById('micIcon');

  wrap.className = 'mic-wrap';
  wrap.classList.add({
    idle:    '',
    wake:    'wrap-wake',
    command: 'wrap-command',
    process: 'wrap-process',
    speak:   'wrap-speak',
    error:   'wrap-error'
  }[s] || '');

  const icons = { idle: 'ti-microphone', wake: 'ti-microphone', command: 'ti-microphone', process: 'ti-loader-2', speak: 'ti-volume', error: 'ti-microphone-off' };
  icon.className = 'ti ' + icons[s];
  if (s === 'process') icon.classList.add('spin-icon');

  const texts = {
    wake:    `Sage „${cfg.assistantName}“ um zu starten`,
    command: 'Ich höre zu…',
    process: 'Verarbeite…',
    speak:   'Spricht…',
    error:   'Fehler – Seite neu laden oder Mikrofon prüfen'
  };
  if (texts[s]) document.getElementById('statusText').textContent = texts[s];
  else refreshStatusText();

  const footers = {
    wake:    ['Warte auf Wake-Word…', 'loading'],
    command: ['Aufnahme läuft', 'loading'],
    process: ['Verarbeite Anfrage…', 'loading'],
    speak:   ['Sprachausgabe', 'active'],
    error:   ['Fehler', 'error'],
    idle:    ['Bereit', '']
  };
  const [msg, mode] = footers[s] || ['Bereit', ''];
  setFooter(msg, mode);
}

function refreshStatusText() {
  const el = document.getElementById('statusText');
  if (!cfg.apiKey) {
    el.textContent = 'Einstellungen öffnen und Gemini API-Key eingeben';
  } else if (active) {
    el.textContent = `Sage „${cfg.assistantName}“ um zu starten`;
  } else {
    el.textContent = 'Mikrofon starten um Sprachassistenten zu aktivieren';
  }
}

function setFooter(msg, mode) {
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('statusDot').className = 'status-dot' + (mode ? ' ' + mode : '');
}

// ── Toggle ───────────────────────────────────────────────────────────────────
function toggleListening() {
  if (!cfg.apiKey) {
    if (!document.getElementById('settingsPanel').classList.contains('open')) toggleSettings();
    setFooter('Bitte Gemini API-Key eingeben', 'error');
    return;
  }
  active ? stopAll() : startWake();
}

function stopAll() {
  active = false;
  clearTimeout(cmdTimer);
  try { wakeRec?.abort(); } catch {}
  try { cmdRec?.abort();  } catch {}
  wakeRec = cmdRec = null;
  window.speechSynthesis.cancel();
  setState('idle');
}

// ── Wake-Word Recognition ─────────────────────────────────────────────────────
function startWake() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('statusText').textContent = 'Web Speech API nicht verfügbar. Bitte Chrome oder Edge verwenden.';
    setState('error');
    return;
  }
  active = true;
  setState('wake');

  wakeRec = new SR();
  wakeRec.continuous     = true;
  wakeRec.interimResults = true;
  wakeRec.lang           = 'de-DE';

  wakeRec.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i][0].transcript.toLowerCase().includes(cfg.assistantName.toLowerCase())) {
        onWakeWord();
        return;
      }
    }
  };

  wakeRec.onend = () => {
    if (active && state === 'wake') setTimeout(() => { if (active && state === 'wake') startWake(); }, 250);
  };

  wakeRec.onerror = (e) => {
    if (e.error === 'not-allowed') {
      document.getElementById('statusText').textContent = 'Mikrofon-Zugriff verweigert. Bitte in den Browser-Einstellungen erlauben und Seite neu laden.';
      setState('error');
      active = false;
    }
  };

  try { wakeRec.start(); } catch {}
}

function onWakeWord() {
  try { wakeRec?.abort(); } catch {}
  wakeRec = null;
  beep(880, 0.18);
  setTimeout(startCommand, 220);
}

// ── Command Recognition ────────────────────────────────────────────────────────
function startCommand() {
  if (!active) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  setState('command');
  beep(660, 0.10);

  cmdRec = new SR();
  cmdRec.lang           = 'de-DE';
  cmdRec.continuous     = false;
  cmdRec.interimResults = false;

  cmdTimer = setTimeout(() => {
    try { cmdRec?.abort(); } catch {}
    if (active) startWake();
  }, 7000);

  cmdRec.onresult = (e) => {
    clearTimeout(cmdTimer);
    const text = e.results[0][0].transcript.trim();
    if (text) processCommand(text);
    else if (active) startWake();
  };

  cmdRec.onerror = (e) => {
    clearTimeout(cmdTimer);
    if (e.error !== 'no-speech' && e.error !== 'aborted') console.error('[voice] cmd error:', e.error);
    if (active) setTimeout(startWake, 200);
  };

  cmdRec.onend = () => clearTimeout(cmdTimer);

  try { cmdRec.start(); } catch { if (active) startWake(); }
}

// ── Process ────────────────────────────────────────────────────────────────────
async function processCommand(text) {
  setState('process');
  addTranscript('user', text);

  try {
    const r = await fetch('/apps/voice-assistant/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message:       text,
        history:       history.slice(-10),
        haUrl:         cfg.haUrl,
        haToken:       cfg.haToken,
        apiKey:        cfg.apiKey,
        assistantName: cfg.assistantName,
        userName:      cfg.userName
      })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Serverfehler');

    const reply = data.reply;
    addTranscript('assistant', reply);
    showResponse(reply);
    history.push({ role: 'user', content: text }, { role: 'model', content: reply });
    if (history.length > 20) history = history.slice(-20);
    speak(reply);

  } catch (err) {
    console.error('[voice]', err);
    const msg = err.message.includes('429')
      ? 'Einen Moment bitte, ich bin kurz überlastet.'
      : 'Entschuldigung, da ist etwas schiefgelaufen.';
    speak(msg);
  }
}

// ── TTS ────────────────────────────────────────────────────────────────────────
function speak(text) {
  setState('speak');
  window.speechSynthesis.cancel();

  const utt  = new SpeechSynthesisUtterance(text);
  utt.lang   = 'de-DE';
  utt.rate   = 1.05;

  const voices = window.speechSynthesis.getVoices();
  const deVoice = voices.find(v => v.lang === 'de-DE') || voices.find(v => v.lang.startsWith('de'));
  if (deVoice) utt.voice = deVoice;

  utt.onend  = () => { if (active) startWake(); else setState('idle'); };
  utt.onerror = () => { if (active) startWake(); else setState('idle'); };

  window.speechSynthesis.speak(utt);
}

// ── UI ─────────────────────────────────────────────────────────────────────────
function showResponse(text) {
  document.getElementById('responseBox').style.display = 'block';
  document.getElementById('responseText').textContent = text;
}

function addTranscript(role, text) {
  const list = document.getElementById('transcriptList');
  const el   = document.createElement('div');
  el.className = 't-item ' + role;
  const time = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  const name = role === 'user' ? (cfg.userName || 'Du') : (cfg.assistantName || 'Assistent');
  el.innerHTML = `<div class="t-meta">${esc(name)} · ${time}</div>${esc(text)}`;
  list.appendChild(el);
  list.scrollTop = list.scrollHeight;
}

function clearHistory() {
  history = [];
  document.getElementById('transcriptList').innerHTML = '';
  document.getElementById('responseBox').style.display = 'none';
  setFooter('Verlauf gelöscht', '');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Beep ───────────────────────────────────────────────────────────────────────
function beep(freq = 880, vol = 0.18) {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
    osc.start(); osc.stop(ctx.currentTime + 0.18);
  } catch {}
}

// ── Init ───────────────────────────────────────────────────────────────────────
(async () => {
  loadSettings();

  try {
    const s = await fetch('/api/secrets').then(r => r.ok ? r.json() : {});
    if (s.gemini_api_key && !cfg.apiKey) {
      cfg.apiKey = s.gemini_api_key;
      document.getElementById('cfgApiKey').value = cfg.apiKey;
      refreshStatusText();
    }
  } catch {}

  if (!cfg.apiKey) {
    document.getElementById('settingsPanel').classList.add('open');
    document.getElementById('settingsToggle').classList.add('active');
  }

  // Pre-warm voice list
  window.speechSynthesis.getVoices();
  if ('onvoiceschanged' in window.speechSynthesis) {
