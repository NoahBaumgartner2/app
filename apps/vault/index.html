<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tresor · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --bg2: #171717; --bg3: #1f1f1f; --bg4: #2a2a2a;
    --border: #2e2e2e; --border2: #3a3a3a;
    --text: #f0f0f0; --text2: #999; --text3: #555;
    --accent: #a78bfa; --accent-dim: #4c1d95; --accent-bg: #1a0a33;
    --green: #4ade80; --green-bg: #0d2818; --green-dim: #166534;
    --red: #f87171; --red-bg: #2a0d0d;
    --mono: 'DM Mono', monospace;
    --sans: 'Instrument Sans', sans-serif;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Header ── */
  header { border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 100; gap: 1rem; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
  .logo-icon { width: 28px; height: 28px; background: var(--accent-bg); border: 1px solid var(--accent-dim); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .back-link { font-family: var(--mono); font-size: 11px; color: var(--text2); text-decoration: none; }
  .back-link:hover { color: var(--text); }
  .badge { font-family: var(--mono); font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); white-space: nowrap; }

  /* ── Main ── */
  main { flex: 1; max-width: 780px; width: 100%; margin: 0 auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; font-family: var(--sans); cursor: pointer; transition: all .15s; border: none; }
  .btn-primary { background: var(--accent); color: #0f0a1f; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }

  /* ── Form panel ── */
  .form-panel { background: var(--bg2); border: 1px solid var(--accent-dim); border-radius: var(--radius); overflow: hidden; }
  .form-panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .form-panel-title { font-size: 14px; font-weight: 600; color: var(--accent); }
  .close-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; line-height: 1; }
  .close-btn:hover { background: var(--bg3); color: var(--text); }
  .form-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-family: var(--mono); font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; }
  .form-group input { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 11px; font-size: 13px; color: var(--text); font-family: var(--sans); outline: none; transition: border-color .15s; }
  .form-group input:focus { border-color: var(--accent-dim); }
  .value-wrap { display: flex; gap: 6px; }
  .value-wrap input { flex: 1; font-family: var(--mono); font-size: 13px; }
  .form-footer { display: flex; justify-content: flex-end; gap: 8px; padding-top: 4px; }

  /* ── Toolbar ── */
  .toolbar { display: flex; gap: 10px; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text3); pointer-events: none; }
  .search-wrap input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 11px 8px 32px; font-size: 13px; color: var(--text); font-family: var(--sans); outline: none; transition: border-color .15s; }
  .search-wrap input:focus { border-color: var(--border2); }
  .cat-select { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 11px; font-size: 13px; color: var(--text2); font-family: var(--sans); outline: none; cursor: pointer; }
  .cat-select:focus { border-color: var(--border2); }

  /* ── Entry list ── */
  .entry-list { display: flex; flex-direction: column; gap: 8px; }
  .empty { text-align: center; padding: 3rem 1rem; font-family: var(--mono); font-size: 12px; color: var(--text3); }

  /* ── Entry card ── */
  .entry-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; transition: border-color .15s; }
  .entry-card:hover { border-color: var(--border2); }
  .entry-top { display: flex; align-items: center; gap: 10px; }
  .entry-label { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .cat-badge { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 20px; background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-dim); white-space: nowrap; }
  .icon-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 4px; font-size: 13px; color: var(--text3); transition: all .15s; line-height: 1; }
  .icon-btn:hover { background: var(--bg3); color: var(--text); }
  .icon-btn.danger:hover { background: var(--red-bg); color: var(--red); }

  /* ── Value row ── */
  .value-row { display: flex; align-items: center; gap: 8px; }
  .value-field { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; font-family: var(--mono); font-size: 12px; color: var(--text); outline: none; min-width: 0; cursor: default; }
  .reveal-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 8px; font-size: 12px; cursor: pointer; color: var(--text2); transition: all .15s; white-space: nowrap; }
  .reveal-btn:hover { background: var(--bg3); border-color: var(--border2); color: var(--text); }
  .copy-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12px; font-family: var(--mono); cursor: pointer; color: var(--text2); transition: all .15s; white-space: nowrap; }
  .copy-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
  .copy-btn.copied { background: var(--green-bg); border-color: var(--green-dim); color: var(--green); }

  /* ── Notes ── */
  .entry-notes { font-family: var(--mono); font-size: 11px; color: var(--text3); padding-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Hint ── */
  .hint-box { display: flex; gap: 14px; align-items: center; padding: 10px 14px; border-radius: var(--radius-sm); font-size: 11px; font-family: var(--mono); line-height: 1.5; color: #6b7280; background: var(--bg2); border: 1px solid var(--border); }
  .key-dl-btn { flex-shrink: 0; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 11px; font-family: var(--mono); color: var(--text2); text-decoration: none; white-space: nowrap; transition: all .15s; }
  .key-dl-btn:hover { border-color: var(--accent-dim); color: var(--accent); }

  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 560px) {
    .form-row { grid-template-columns: 1fr; }
    .value-row { flex-wrap: wrap; }
    .value-field { min-width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <a href="/" class="back-link">← Dashboard</a>
    <div class="logo-icon">🔑</div>
    <span>Tresor</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="badge" id="countBadge">…</span>
    <button class="btn btn-primary" onclick="showForm()">+ Neu</button>
  </div>
</header>

<main>

  <!-- Add / Edit form -->
  <div class="form-panel" id="formPanel" style="display:none">
    <div class="form-panel-header">
      <span class="form-panel-title" id="formTitle">Neuer Eintrag</span>
      <button class="close-btn" onclick="hideForm()">✕</button>
    </div>
    <div class="form-body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Bezeichnung *</label>
        <input type="text" id="fLabel" placeholder="z.B. Google OAuth Client Secret" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Wert *</label>
        <div class="value-wrap">
          <input type="password" id="fValue" placeholder="Geheimer Wert…" autocomplete="off" spellcheck="false">
          <button class="reveal-btn" onclick="toggleEye('fValue', this)">👁</button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Kategorie</label>
          <input type="text" id="fCategory" placeholder="z.B. Google, AWS, Datenbank" list="catSuggestions" autocomplete="off">
          <datalist id="catSuggestions"></datalist>
        </div>
        <div class="form-group">
          <label>Notiz</label>
          <input type="text" id="fNotes" placeholder="Wofür wird der Key verwendet?">
        </div>
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" onclick="hideForm()">Abbrechen</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveEntry()">✓ Speichern</button>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Suchen…" oninput="render()">
    </div>
    <select class="cat-select" id="catFilter" onchange="render()">
      <option value="">Alle</option>
    </select>
  </div>

  <!-- List -->
  <div class="entry-list" id="entryList">
    <div class="empty">Lade…</div>
  </div>

  <!-- Info + Key backup -->
  <div class="hint-box">
    <div style="flex:1">
      🔒 Alle Werte sind mit AES-256-GCM verschlüsselt. Der Schlüssel (<code>vault.key</code>) liegt nur auf dem Server — ohne ihn sind die Daten nicht lesbar.
      <strong style="color:#d1d5db"> Backup empfohlen.</strong>
    </div>
    <a href="/apps/vault/api/download-key" class="key-dl-btn" download="vault.key">⬇ Schlüssel sichern</a>
  </div>

</main>

<script>
let entries = [];

// ── Load ──────────────────────────────────────────────────────────────────
async function load() {
  const r = await fetch('/apps/vault/api/entries').catch(() => null);
  if (!r?.ok) {
    document.getElementById('entryList').innerHTML = '<div class="empty">Fehler beim Laden.</div>';
    return;
  }
  entries = await r.json();
  render();
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const q   = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;

  const filtered = entries.filter(e =>
    (!q || [e.label, e.category, e.notes].some(f => (f||'').toLowerCase().includes(q))) &&
    (!cat || e.category === cat)
  );

  document.getElementById('countBadge').textContent =
    `${entries.length} Eintrag${entries.length !== 1 ? 'e' : ''}`;

  // Rebuild category filter options
  const cats = [...new Set(entries.map(e => e.category).filter(Boolean))].sort();
  const sel  = document.getElementById('catFilter');
  const cur  = sel.value;
  sel.innerHTML = '<option value="">Alle</option>' +
    cats.map(c => `<option value="${esc(c)}"${c===cur?' selected':''}>${esc(c)}</option>`).join('');

  // Rebuild datalist for form
  const dl = document.getElementById('catSuggestions');
  if (dl) dl.innerHTML = cats.map(c => `<option value="${esc(c)}">`).join('');

  const list = document.getElementById('entryList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty">${entries.length ? 'Keine Treffer.' : 'Noch keine Einträge — klicke auf „+ Neu".'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(e => `
    <div class="entry-card">
      <div class="entry-top">
        <div class="entry-label">${esc(e.label)}</div>
        <div class="entry-meta">
          ${e.category ? `<span class="cat-badge">${esc(e.category)}</span>` : ''}
          <button class="icon-btn" onclick="editEntry(${e.id})" title="Bearbeiten">✏</button>
          <button class="icon-btn danger" onclick="deleteEntry(${e.id}, '${esc(e.label).replace(/'/g,"\\'")}')" title="Löschen">🗑</button>
        </div>
      </div>
      <div class="value-row">
        <input type="password" class="value-field" value="${esc(e.value)}" readonly tabindex="-1" data-id="${e.id}">
        <button class="reveal-btn" onclick="toggleReveal(this)">👁 Anzeigen</button>
        <button class="copy-btn" onclick="copyVal(this, ${e.id})">📋 Kopieren</button>
      </div>
      ${e.notes ? `<div class="entry-notes">${esc(e.notes)}</div>` : ''}
    </div>
  `).join('');
}

// ── Actions ───────────────────────────────────────────────────────────────
function toggleReveal(btn) {
  const input = btn.previousElementSibling;
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  btn.textContent = show ? '🙈 Verbergen' : '👁 Anzeigen';
}

function copyVal(btn, id) {
  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  navigator.clipboard.writeText(entry.value).then(() => {
    btn.textContent = '✓ Kopiert';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Kopieren'; btn.classList.remove('copied'); }, 1800);
  });
}

// ── Form ──────────────────────────────────────────────────────────────────
function showForm(entry = null) {
  document.getElementById('formPanel').style.display  = 'block';
  document.getElementById('formTitle').textContent    = entry ? 'Eintrag bearbeiten' : 'Neuer Eintrag';
  document.getElementById('editId').value             = entry?.id ?? '';
  document.getElementById('fLabel').value             = entry?.label    ?? '';
  document.getElementById('fValue').value             = entry?.value    ?? '';
  document.getElementById('fValue').type              = 'password';
  document.getElementById('fCategory').value          = entry?.category ?? '';
  document.getElementById('fNotes').value             = entry?.notes    ?? '';
  document.getElementById('fLabel').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function hideForm() {
  document.getElementById('formPanel').style.display = 'none';
  document.getElementById('editId').value = '';
}

function editEntry(id) {
  showForm(entries.find(e => e.id === id));
}

async function saveEntry() {
  const id       = document.getElementById('editId').value;
  const label    = document.getElementById('fLabel').value.trim();
  const value    = document.getElementById('fValue').value;
  const category = document.getElementById('fCategory').value.trim();
  const notes    = document.getElementById('fNotes').value.trim();

  if (!label) { document.getElementById('fLabel').focus(); return; }
  if (!value) { document.getElementById('fValue').focus(); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '…';

  const r = await fetch(id ? `/apps/vault/api/entries/${id}` : '/apps/vault/api/entries', {
    method:  id ? 'PUT' : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ label, value, category, notes }),
  }).catch(() => null);

  btn.disabled = false;
  btn.textContent = '✓ Speichern';

  if (!r?.ok) {
    const d = await r?.json().catch(() => ({}));
    alert(d?.error || 'Fehler beim Speichern.');
    return;
  }
  hideForm();
  await load();
}

async function deleteEntry(id, label) {
  if (!confirm(`„${label}" wirklich löschen?\nDieser Vorgang kann nicht rückgängig gemacht werden.`)) return;
  await fetch(`/apps/vault/api/entries/${id}`, { method: 'DELETE' });
  await load();
}

function toggleEye(inputId, btn) {
  const input = document.getElementById(inputId);
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideForm();
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveEntry();
});

load();
</script>
</body>
</html>
