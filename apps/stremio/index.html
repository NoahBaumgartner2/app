<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stremio · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #111111;
      --surface:      #1a1a1a;
      --surface2:     #222222;
      --border:       rgba(255,255,255,.08);
      --border-hv:    rgba(255,255,255,.18);
      --text:         #f0f0ee;
      --muted:        #888;
      --accent:       #8458B3;
      --accent-dim:   rgba(132,88,179,.18);
      --accent-border:rgba(132,88,179,.4);
      --accent-text:  #b48edc;
      --radius:       14px;
      --shadow:       0 1px 4px rgba(0,0,0,.4), 0 4px 20px rgba(0,0,0,.35);
      --ok:           #22c55e;
      --err:          #ef4444;
    }

    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .app-header {
      padding: 0 2rem; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 1rem; height: 56px;
      position: sticky; top: 0; z-index: 10;
    }
    .back-link { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); text-decoration: none; transition: color .15s; }
    .back-link:hover { color: var(--text); }
    .header-title { font-size: 16px; font-weight: 600; letter-spacing: -.3px; flex: 1; }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      padding: 3px 10px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
      transition: all .3s;
    }
    .status-pill.online  { background: rgba(34,197,94,.1);  border-color: rgba(34,197,94,.3);  color: #4ade80; }
    .status-pill.offline { background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.25); color: #f87171; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background .3s; }
    .status-pill.online  .status-dot { background: var(--ok);  box-shadow: 0 0 6px rgba(34,197,94,.6); }
    .status-pill.offline .status-dot { background: var(--err); }

    .main { max-width: 480px; margin: 4rem auto; padding: 0 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); }

    .info-line {
      font-size: 13px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 1.25rem;
    }
    .info-line span { color: var(--accent-text); }

    .btn-row { display: flex; gap: .75rem; flex-wrap: wrap; }

    .btn {
      padding: 10px 20px; border-radius: 9px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background .15s, border-color .15s, transform .1s;
      display: inline-flex; align-items: center; gap: 7px;
    }
    .btn:hover        { background: #2a2a2a; border-color: var(--border-hv); }
    .btn:active       { transform: scale(.97); }
    .btn.accent       { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent-text); font-size: 15px; }
    .btn.accent:hover { background: rgba(132,88,179,.28); }
    .btn.danger       { background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.3); color: #f87171; }
    .btn.danger:hover { background: rgba(239,68,68,.15); }
    .btn:disabled     { opacity: .4; cursor: not-allowed; transform: none; }

    .toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 18px; font-size: 13px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      transition: transform .25s ease; z-index: 100; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header class="app-header">
  <a class="back-link" href="/">← Dashboard</a>
  <div class="header-title">🎬 Stremio</div>
  <div class="status-pill" id="statusPill">
    <div class="status-dot"></div>
    <span id="statusText">Prüfe…</span>
  </div>
</header>

<main class="main">
  <div class="card">
    <div class="info-line">Stremio Server <span>v4.20.18</span> läuft auf diesem Server.</div>
    <div class="btn-row">
      <button class="btn accent" onclick="openStremio()">▶ Stremio öffnen</button>
      <button class="btn danger" id="restartBtn" onclick="restartStremio()">🔄 Neu starten</button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  let toastTimer;
  function showToast(msg, duration = 3000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), duration);
  }

  async function pollStatus() {
    try {
      const res  = await fetch('/api/stremio/status');
      const data = await res.json();
      const pill = document.getElementById('statusPill');
      const txt  = document.getElementById('statusText');
      if (data.running) {
        pill.className  = 'status-pill online';
        txt.textContent = 'Läuft';
      } else {
        pill.className  = 'status-pill offline';
        txt.textContent = 'Gestoppt';
      }
    } catch {
      document.getElementById('statusPill').className = 'status-pill offline';
      document.getElementById('statusText').textContent = 'Fehler';
    }
  }

  function openStremio() {
    window.location.href = 'stremio://';
  }

  async function restartStremio() {
    if (!confirm('Stremio-Container neu starten?')) return;
    const btn = document.getElementById('restartBtn');
    btn.disabled    = true;
    btn.textContent = '⏳ Startet neu…';
    try {
      const res  = await fetch('/api/stremio/restart', { method: 'POST' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Fehler');
      showToast('Container wird neu gestartet…', 5000);
      setTimeout(pollStatus, 8000);
    } catch (e) {
      showToast('Fehler: ' + e.message);
    } finally {
      btn.disabled  = false;
      btn.innerHTML = '🔄 Neu starten';
    }
  }

  pollStatus();
  setInterval(pollStatus, 10000);
</script>
</body>
</html>
